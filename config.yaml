# What I Watched Sync Engine Central Configuration
# All behaviors are explicitly defined here. Never hidden in code.

sync_cadence:
  frequency: "app_launch"       # Options: app_launch, 15m, 30m, manual
  scrobble_mode: "threshold"    # Options: threshold, immediate
  scrobble_threshold_percent: 85 # Configurable completion threshold (0-100)

conflict_policy:
  default_action: "prompt"     # Options: prompt, merge, keep_separate, skip, delete, edit
  unmatched_action: "log_and_prompt" # Options: log_and_prompt, skip, keep_retrying

enrichment_policy:
  otaku_mappings:
    enabled: true
    mode: "selective"          # ONLY enriches missing IDs/offsets; never overwrites existing valid IDs
    update_check: "etag"       # Checks HTTP ETag / HEAD headers on startup

providers:
  trakt:
    enabled: true
    rate_limit_rpm: 40
  myanimelist:
    enabled: true
    rate_limit_delay_ms: 600
  simkl:
    enabled: true
    batch_size: 100
    anime_mode: "auto_native_preferred"  # Options: auto_native_preferred, tvdb_hybrid_only, native_only
  nuvio_sync:
    enabled: true
    batch_size: 100

ui:
  toasts_enabled: true
  toast_duration_ms: 4000
  toast_density: "all"         # Options: all, warnings_errors, silent
  show_outbox_badges: true
